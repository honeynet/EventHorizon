services:
  prometheus-exporter:
    build:
      context: .
      dockerfile: ./docker/prometheus/Dockerfile
    container_name: prometheus-exporter
    ports:
      - "127.0.0.1:9101:9101"
    volumes:
      - tarpit-sock:/tmp  # Shared volume for domain socket
      - ${PATH_TO_COUNTRY_MMDB}:/data/GeoLite2-Country.mmdb:ro
    environment:
      - GEO_DB=/data/GeoLite2-Country.mmdb
    healthcheck:
      test: ["CMD", "wget", "--spider", "--proxy=off", "http://localhost:9101/metrics"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s


  telnet_pit:
    build:
      context: .
      dockerfile: ./docker/tarpits/Dockerfile
    ports:
      - ${TELNET_PORT}:${TELNET_PORT}
    volumes:
      - tarpit-sock:/tmp  # Share socket with prometheus-exporter
    ulimits:
      nofile:
        soft: "${TELNET_MAX_NO_CLIENTS}"
        hard: "${TELNET_MAX_NO_CLIENTS}"
    command: ["start", "telnet", "${TELNET_PORT}", "${TELNET_DELAY_MS}", "${TELNET_MAX_NO_CLIENTS}"]
    depends_on:
      prometheus-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${TELNET_PORT} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  upnp_pit:
    build:
      context: .
      dockerfile: ./docker/tarpits/Dockerfile
    ports:
      - ${UPNP_SSDP_PORT}:${UPNP_SSDP_PORT}/udp
      - ${UPNP_HTTP_PORT}:${UPNP_HTTP_PORT}
    volumes:
      - tarpit-sock:/tmp  # Share socket with prometheus-exporter
    ulimits:
      nofile:
        soft: "${UPNP_MAX_NO_CLIENTS}"
        hard: "${UPNP_MAX_NO_CLIENTS}"
    command: ["start", "upnp", "${UPNP_HTTP_PORT}", "${UPNP_SSDP_PORT}", "${UPNP_DELAY_MS}", "${UPNP_MAX_NO_CLIENTS}"]
    depends_on:
      prometheus-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${UPNP_HTTP_PORT} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  mqtt_pit:
    build:
      context: .
      dockerfile: ./docker/tarpits/Dockerfile
    ports:
      - ${MQTT_PORT}:${MQTT_PORT}
    volumes:
      - tarpit-sock:/tmp  # Share socket with prometheus-exporter
    ulimits:
      nofile:
        soft: "${MQTT_MAX_NO_CLIENTS}"
        hard: "${MQTT_MAX_NO_CLIENTS}"
    command: ["start", "mqtt", "${MQTT_PORT}", "${MQTT_MAX_EVENTS}", "${MQTT_EPOLL_TIMEOUT_INTERVAL_MS}", "${MQTT_PUBREL_INTERVAL_MS}", "${MQTT_MAX_PACKETS_PER_CLIENTS}", "${MQTT_MAX_NO_CLIENTS}"]
    depends_on:
      prometheus-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${MQTT_PORT} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  coap_pit:
    build:
      context: .
      dockerfile: ./docker/tarpits/Dockerfile
    ports:
      - ${COAP_PORT}:${COAP_PORT}/udp
    volumes:
      - tarpit-sock:/tmp  # Share socket with prometheus-exporter
    command: ["start", "coap", "${COAP_PORT}", "${COAP_DELAY_MS}", "${COAP_ACK_TIMEOUT_MS}", "${COAP_MAX_RETRANSMIT}", "${COAP_MAX_NO_CLIENTS}"]
    depends_on:
      prometheus-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -zu localhost ${COAP_PORT} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  endlessh:
    build:
      context: .
      dockerfile: ./endlessh/Dockerfile
    ports:
      - "${SSH_PORT}:${SSH_PORT}"
    volumes:
      - tarpit-sock:/tmp  # Share socket with prometheus-exporter
    command: ["-${SSH_BIND_FAMILY}", "-d ${SSH_DELAY}", "-l ${SSH_MAX_LINE_LENGTH}", "-m ${SSH_MAX_CLIENTS}", "-p ${SSH_PORT}", "-v"]
    depends_on:
      prometheus-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost ${SSH_PORT} || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      prometheus-exporter:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "--proxy=off", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/dashboards
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      prometheus:
        condition: service_healthy
    environment:
    - GF_LOG_LEVEL=warn

volumes:
  grafana-storage:
  tarpit-sock:
